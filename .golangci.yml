version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    staticcheck:
      checks:
        - all
        - -ST1005
        - -ST1012
        - -SA1019

  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused
          - staticcheck
          - ineffassign
      - path: tests/
        linters:
          - errcheck
          - unused
          - staticcheck
          - ineffassign
      - path: testwrappers/
        linters:
          - errcheck
          - unused
          - staticcheck
          - ineffassign
      - path: benchmark_test\.go
        linters:
          - errcheck
      - path: cmd/main/
        linters:
          - errcheck
          - unused
          - staticcheck
          - ineffassign
      - path: scripts/autofix/
        linters:
          - ineffassign
          - staticcheck
      - path: coredata/(coredynamic|coreonce|corestr)/
        linters:
          - govet
        text: "copylocks"
